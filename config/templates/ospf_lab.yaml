lab_name: "OSPF_Routing_Lab"
author: "admin"
description: "3台路由器 OSPF 单区域实验（华为）"
nodes:
  - name: "R1"
    template: "huaweiar1k"
    ram: 512
    cpu: 1
    ethernet: 3
  - name: "R2"
    template: "huaweiar1k"
    ram: 512
    cpu: 1
    ethernet: 3
  - name: "R3"
    template: "huaweiar1k"
    ram: 512
    cpu: 1
    ethernet: 3
networks:
  - name: "Net1"
    type: "bridge"
  - name: "Net2"
    type: "bridge"
  - name: "Net3"
    type: "bridge"
links:
  - [R1, G0/0/0, Net1]
  - [R1, G0/0/1, Net2]
  - [R2, G0/0/0, Net2]
  - [R2, G0/0/1, Net3]
  - [R3, G0/0/0, Net3]
